services:
  unipay-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: unipay-gateway:local
    env_file:
      - path: .env.example
        required: true
      - path: .env
        required: false
    environment:
      UNIPAY_GATEWAY_BIND_ADDR: 0.0.0.0:8080
    ports:
      - "${UNIPAY_GATEWAY_PORT:-8080}:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/v1/health/live"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
